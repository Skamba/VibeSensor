[platformio]
default_envs = m5stack_atom

[env:firmware_esp32]
platform = espressif32@6.13.0
framework = arduino
; Keep the Arduino framework package pinned explicitly instead of inheriting the platform's range.
platform_packages =
  framework-arduinoespressif32@3.20017.0
monitor_speed = 115200
lib_ldf_mode = deep+
lib_deps =
  adafruit/Adafruit NeoPixel@1.15.4

[env:m5stack_atom]
extends = env:firmware_esp32
board = m5stack-atom
build_flags =
  -D CORE_DEBUG_LEVEL=0
  -D VIBESENSOR_ATOM_ESP32_PICO=1
  ; Optional runtime tuning overrides (examples):
  ; -D VIBESENSOR_SAMPLE_RATE_HZ=800
  ; -D VIBESENSOR_FRAME_SAMPLES=80
  ; -D VIBESENSOR_SERVER_DATA_PORT=9000
  ; -D VIBESENSOR_SERVER_CONTROL_PORT=9001
  ; -D VIBESENSOR_CONTROL_PORT_BASE=9010
  ; -D VIBESENSOR_FRAME_QUEUE_LEN_TARGET=128
  ; -D VIBESENSOR_FRAME_QUEUE_LEN_MIN=16
  ; -D VIBESENSOR_WIFI_CONNECT_TIMEOUT_MS=15000
  ; -D VIBESENSOR_WIFI_RETRY_BACKOFF_MS=2000
  ; -D VIBESENSOR_WIFI_RETRY_INTERVAL_MS=4000
  ; -D VIBESENSOR_WIFI_INITIAL_CONNECT_ATTEMPTS=3
  ; -D VIBESENSOR_WIFI_SCAN_INTERVAL_MS=20000
  ; -D VIBESENSOR_SAMPLING_TASK_CORE=0

[env:esp32-c3-devkitm-1]
extends = env:firmware_esp32
board = esp32-c3-devkitm-1
; Experimental compile-coverage target only. Runtime pin and LED defaults still
; match the ATOM Lite layout in `src/runtime_config.h`.
build_flags =
  -D CORE_DEBUG_LEVEL=0

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  -std=gnu++11
  -I test/native_support
  -I include
  -I lib/vibesensor_proto
; Native tests run against host-side seams, so hardware-only firmware libraries stay excluded here.
lib_ignore =
  adxl345
  vibesensor_proto
  Adafruit_NeoPixel
