name: Build Pi image
description: Build the shared Pi image workflow artifact using the canonical repo pipeline.

inputs:
  release-dir-name:
    description: Runner-temp subdirectory name for collected workflow assets.
    required: true
  release-artifact-name:
    description: Final renamed Pi image zip filename.
    required: true
  workflow-artifact-name:
    description: Workflow artifact name used for actions/upload-artifact.
    required: true
  include-published-artifact:
    description: Whether to append published_artifact metadata to the version file.
    required: false
    default: "false"

outputs:
  python-path:
    description: Configured Python interpreter path.
    value: ${{ steps.setup-python.outputs.python-path }}
  release-dir:
    description: Directory containing collected Pi image workflow assets.
    value: ${{ steps.assets.outputs.release-dir }}
  release-artifact-name:
    description: Final renamed Pi image artifact filename.
    value: ${{ steps.assets.outputs.release-artifact-name }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"
        cache: npm
        cache-dependency-path: apps/ui/package-lock.json

    - name: Set up configured Python runtime
      id: setup-python
      uses: ./.github/actions/setup-python

    - name: Install Pi image build prerequisites
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y qemu-user qemu-user-static rsync xz-utils

    - name: Build Pi image
      shell: bash
      env:
        VS_PYTHON_BIN: ${{ steps.setup-python.outputs.python-path }}
      run: |
        set -euo pipefail
        ./infra/pi-image/pi-gen/build.sh

    - name: Collect Pi image workflow artifacts
      id: assets
      shell: bash
      env:
        VS_RELEASE_DIR_NAME: ${{ inputs.release-dir-name }}
        VS_RELEASE_ARTIFACT_NAME: ${{ inputs.release-artifact-name }}
        VS_INCLUDE_PUBLISHED_ARTIFACT: ${{ inputs.include-published-artifact }}
      run: |
        set -euo pipefail
        out_dir="infra/pi-image/pi-gen/out"
        release_dir="${RUNNER_TEMP}/${VS_RELEASE_DIR_NAME}"
        artifact_name="${VS_RELEASE_ARTIFACT_NAME}"
        mkdir -p "${release_dir}"

        artifact="$(find "${out_dir}" -maxdepth 1 -type f \
          -name "image_*-vibesensor-lite*.zip" \
          | sort | tail -n 1 || true)"
        if [ -z "${artifact}" ]; then
          echo "No Pi image artifact found in ${out_dir}" >&2
          exit 1
        fi

        release_artifact="${release_dir}/${artifact_name}"
        cp "${artifact}" "${release_artifact}"

        sha_file="${release_artifact}.sha256"
        sha256sum "${release_artifact}" > "${sha_file}"

        version_info_source="${out_dir}/$(basename "${artifact}").version.txt"
        version_info_target="${release_artifact}.version.txt"
        if [ -f "${version_info_source}" ]; then
          cp "${version_info_source}" "${version_info_target}"
        else
          printf 'git_sha=%s\ngit_ref=%s\nsource_artifact=%s\n' \
            "${GITHUB_SHA}" \
            "${GITHUB_REF}" \
            "$(basename "${artifact}")" \
            > "${version_info_target}"
        fi

        if [ "${VS_INCLUDE_PUBLISHED_ARTIFACT}" = "true" ]; then
          echo "published_artifact=${artifact_name}" >> "${version_info_target}"
        fi
        {
          echo "workflow_name=${GITHUB_WORKFLOW}"
          echo "runner_label=ubuntu-24.04-arm"
          echo "run_id=${GITHUB_RUN_ID}"
        } >> "${version_info_target}"

        {
          echo "release-dir=${release_dir}"
          echo "release-artifact-name=${artifact_name}"
        } >> "${GITHUB_OUTPUT}"

    - name: Upload Pi image workflow artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.workflow-artifact-name }}
        path: ${{ steps.assets.outputs.release-dir }}/*
        if-no-files-found: error
        retention-days: 21
