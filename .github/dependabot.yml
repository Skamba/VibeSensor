version: 2
# Weekly cadence, grouped minor/patch updates, and per-ecosystem PR caps keep
# dependency churn reviewable without hiding major version jumps.
updates:
  - package-ecosystem: pip
    directory: /apps/server
    schedule:
      interval: weekly
    labels:
      - dependencies
      - CI
    open-pull-requests-limit: 5
    groups:
      backend-runtime-minor-patch:
        applies-to: version-updates
        patterns:
          - "fastapi"
          - "numpy"
          - "packaging"
          - "PyYAML"
          - "reportlab"
          - "granian*"
          - "uvloop"
          - "websockets"
          - "esptool"
        update-types:
          - minor
          - patch
      backend-tooling-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "fastapi"
          - "numpy"
          - "packaging"
          - "PyYAML"
          - "reportlab"
          - "granian*"
          - "uvloop"
          - "websockets"
          - "esptool"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /apps/ui
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 5
    groups:
      ui-runtime-minor-patch:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch
      ui-tooling-minor-patch:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # GitHub Actions updates can directly affect CI behavior.
    labels:
      - CI
      - dependencies
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    # Docker image updates affect build and local-dev runtime coverage.
    labels:
      - CI
      - dependencies
    open-pull-requests-limit: 5
    groups:
      docker-base-images-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
