name: Manual Pi Image ARM

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-pi-image-arm
  cancel-in-progress: false

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute ARM image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          build_label="$(date -u +%y-%m-%d)-run-${GITHUB_RUN_NUMBER}-attempt-${GITHUB_RUN_ATTEMPT}"
          artifact_prefix="VibeSensor-arm-${build_label}"
          {
            echo "build_label=${build_label}"
            echo "artifact_prefix=${artifact_prefix}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: apps/server/pyproject.toml

      - name: Restore Yocto downloads cache
        uses: actions/cache@v4
        with:
          path: infra/pi-image/yocto/.build/downloads
          key: yocto-downloads-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('infra/pi-image/yocto/kas/*.yml', 'infra/pi-image/yocto/meta-vibesensor/**', 'infra/pi-image/yocto/build.sh', 'apps/server/pyproject.toml', 'apps/ui/package-lock.json') }}
          restore-keys: |
            yocto-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore Yocto sstate cache
        uses: actions/cache@v4
        with:
          path: infra/pi-image/yocto/.build/sstate-cache
          key: yocto-sstate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('infra/pi-image/yocto/kas/*.yml', 'infra/pi-image/yocto/meta-vibesensor/**', 'infra/pi-image/yocto/build.sh', 'apps/server/pyproject.toml', 'apps/ui/package-lock.json') }}
          restore-keys: |
            yocto-sstate-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Yocto build prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bzip2 chrpath cpio diffstat dosfstools file gawk git iproute2 \
            iputils-ping locales mtools openssl parted rsync sudo texinfo \
            unzip wget xz-utils zstd
          sudo locale-gen en_US.UTF-8
          {
            echo "LANG=en_US.UTF-8"
            echo "LC_ALL=en_US.UTF-8"
          } >> "${GITHUB_ENV}"
          python3 -m pip install --upgrade pip
          python3 -m pip install "kas>=4,<5" "build>=1,<2"

      - name: Build Pi image
        shell: bash
        run: |
          set -euo pipefail
          BUILD_LABEL="${{ steps.metadata.outputs.build_label }}" ./infra/pi-image/yocto/build.sh

      - name: Collect ARM workflow artifacts
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          out_dir="infra/pi-image/yocto/out"
          release_dir="${RUNNER_TEMP}/manual-pi-image-arm"
          mkdir -p "${release_dir}"

          artifact="$(find "${out_dir}" -maxdepth 1 -type f \
            -name "image_*vibesensor-rpi-universal.wic.bz2" \
            | sort | tail -n 1 || true)"
          if [ -z "${artifact}" ]; then
            echo "No Pi image artifact found in ${out_dir}" >&2
            exit 1
          fi

          release_artifact="${release_dir}/${{ steps.metadata.outputs.artifact_prefix }}.img.bz2"
          cp "${artifact}" "${release_artifact}"

          sha_file="${release_artifact}.sha256"
          sha256sum "${release_artifact}" > "${sha_file}"

          version_info_target="${release_dir}/${{ steps.metadata.outputs.artifact_prefix }}.img.bz2.version.txt"
          printf 'git_sha=%s\ngit_ref=%s\nsource_artifact=%s\nbuild_path=%s\n' \
            "${GITHUB_SHA}" \
            "${GITHUB_REF}" \
            "$(basename "${artifact}")" \
            "infra/pi-image/yocto/build.sh" \
            > "${version_info_target}"
          {
            echo "workflow_name=${GITHUB_WORKFLOW}"
            echo "runner_label=ubuntu-24.04-arm"
            echo "run_id=${GITHUB_RUN_ID}"
          } >> "${version_info_target}"

          manifest_source="${artifact}.manifest.json"
          if [ -f "${manifest_source}" ]; then
            cp "${manifest_source}" "${release_dir}/${{ steps.metadata.outputs.artifact_prefix }}.img.bz2.manifest.json"
          fi

          echo "release_dir=${release_dir}" >> "${GITHUB_OUTPUT}"

      - name: Upload ARM image workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: manual-pi-image-arm-${{ steps.metadata.outputs.build_label }}
          path: ${{ steps.assets.outputs.release_dir }}/*
          if-no-files-found: error
          retention-days: 21
