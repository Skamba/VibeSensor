name: Manual Pi Image ARM

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-pi-image-arm
  cancel-in-progress: false

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute ARM image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          build_label="$(date -u +%y-%m-%d)-run-${GITHUB_RUN_NUMBER}-attempt-${GITHUB_RUN_ATTEMPT}"
          artifact_prefix="VibeSensor-arm-${build_label}"
          {
            echo "build_label=${build_label}"
            echo "artifact_prefix=${artifact_prefix}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build ARM Pi image workflow artifact
        id: build-image
        uses: ./.github/actions/build-pi-image
        with:
          release-dir-name: manual-pi-image-arm
          release-artifact-name: ${{ steps.metadata.outputs.artifact_prefix }}.img.zip
          workflow-artifact-name: manual-pi-image-arm-${{ steps.metadata.outputs.build_label }}
