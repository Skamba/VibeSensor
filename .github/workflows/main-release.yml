name: Main Release

on:
  workflow_run:
    workflows: ["CI"]
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: main-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # workflow_run releases must build the exact commit that completed CI successfully.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Compute version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          base_ver="$(date -u +%Y.%-m.%-d)"
          existing="$(git tag -l "server-v${base_ver}*" | sort -V | tail -n1 || true)"
          if [ -z "${existing}" ]; then
            version="${base_ver}"
          else
            prefix="server-v${base_ver}"
            suffix="${existing#"$prefix"}"
            if [ -z "${suffix}" ]; then
              version="${base_ver}.1"
            else
              n="${suffix#.}"
              version="${base_ver}.$((n + 1))"
            fi
          fi
          {
            echo "version=${version}"
            echo "tag=server-v${version}"
          } >> "${GITHUB_OUTPUT}"
          echo "bundle=vibesensor-fw-v${version}.zip" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json

      - name: Build UI
        shell: bash
        run: python3 tools/build_ui_static.py

      - uses: ./.github/actions/setup-python

      - name: Stamp version and build server wheel
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          cat > apps/server/vibesensor/_version.py <<PYEOF
          # Auto-generated by CI - do not edit.
          __version__ = "${version}"
          PYEOF
          sed -i 's/^          //' apps/server/vibesensor/_version.py
          python -m pip install --upgrade pip build
          python -m build --wheel apps/server/

      - name: Validate built server wheel metadata
        shell: bash
        run: |
          set -euo pipefail
          wheel_path="$(echo apps/server/dist/*.whl)"
          PYTHONPATH=apps/server python -m vibesensor.use_cases.updates.releases.release_validation validate-wheel-metadata \
            --wheel-path "${wheel_path}" \
            --expected-version "${{ steps.version.outputs.version }}"

      - name: Smoke-validate built server wheel
        shell: bash
        run: |
          set -euo pipefail
          wheel_path="$(echo apps/server/dist/*.whl)"
          python3 tools/tests/run_release_smoke.py \
            --skip-ui-build \
            --wheel-path "${wheel_path}" \
            --config apps/server/config.dev.yaml \
            --host 127.0.0.1 \
            --port 18080

      - name: Install PlatformIO
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install pipx
          python -m pipx ensurepath
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          pipx install platformio

      - name: Detect firmware directory
        id: firmware_dir
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t platformio_files < <(git ls-files 'platformio.ini' ':(glob)**/platformio.ini' | sort)
          if [ "${#platformio_files[@]}" -eq 0 ]; then
            echo "No platformio.ini found in repository." >&2
            exit 1
          fi

          selected_file="${platformio_files[0]}"
          for candidate in "${platformio_files[@]}"; do
            if [[ "${candidate}" == firmware/* ]]; then
              selected_file="${candidate}"
              break
            fi
          done

          firmware_dir="$(dirname "${selected_file}")"
          echo "Using firmware directory: ${firmware_dir}"
          echo "path=${firmware_dir}" >> "${GITHUB_OUTPUT}"

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.firmware_dir.outputs.path }}"
          pio run

      - name: Package firmware artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.firmware_dir.outputs.path }}"
          mkdir -p dist

          mapfile -t firmware_bins < <(find .pio/build -mindepth 2 -maxdepth 2 -type f -name firmware.bin | sort)
          if [ "${#firmware_bins[@]}" -eq 0 ]; then
            echo "No firmware.bin found under .pio/build." >&2
            exit 1
          fi

          for firmware_bin in "${firmware_bins[@]}"; do
            env_dir="$(dirname "${firmware_bin}")"
            env_name="$(basename "${env_dir}")"
            target_dir="dist/${env_name}"
            mkdir -p "${target_dir}"

            cp "${env_dir}/firmware.bin" "${target_dir}/firmware.bin"
            if [ -f "${env_dir}/bootloader.bin" ]; then
              cp "${env_dir}/bootloader.bin" "${target_dir}/bootloader.bin"
            fi
            if [ -f "${env_dir}/partitions.bin" ]; then
              cp "${env_dir}/partitions.bin" "${target_dir}/partitions.bin"
            fi
            if [ -f "${env_dir}/boot_app0.bin" ]; then
              cp "${env_dir}/boot_app0.bin" "${target_dir}/boot_app0.bin"
            fi
          done

      - name: Generate flash manifest
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.firmware_dir.outputs.path }}"

          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          dist = Path("dist")
          standard_esp32_app_offset = "0x10000"
          manifest = {"generated_from": os.getenv("GITHUB_SHA", "unknown"), "environments": []}
          env_dirs = sorted([p for p in dist.iterdir() if p.is_dir()])
          for env_dir in env_dirs:
              env_name = env_dir.name
              app_offset = standard_esp32_app_offset
              try:
                  envdump = subprocess.run(
                      ["pio", "run", "-e", env_name, "-t", "envdump"],
                      check=True,
                      capture_output=True,
                      text=True,
                  ).stdout
                  match = re.search(r"ESP32_APP_OFFSET[^0-9A-Fa-f]*(0x[0-9A-Fa-f]+)", envdump)
                  if match:
                      parsed_offset = match.group(1)
                      app_offset = hex(int(parsed_offset, 16))
              except (subprocess.CalledProcessError, ValueError):
                  pass

              segments = []
              for file_name, offset in (
                  ("firmware.bin", app_offset),
                  ("bootloader.bin", "0x1000"),
                  ("partitions.bin", "0x8000"),
                  ("boot_app0.bin", "0xe000"),
              ):
                  artifact = env_dir / file_name
                  if artifact.exists():
                      segments.append(
                          {
                              "file": f"{env_name}/{file_name}",
                              "offset": offset,
                              "sha256": hashlib.sha256(artifact.read_bytes()).hexdigest(),
                          }
                      )

              manifest["environments"].append({"name": env_name, "segments": segments})

          (dist / "flash.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Validate firmware manifest
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=apps/server python -m vibesensor.use_cases.updates.releases.release_validation validate-firmware-manifest \
            --dist-dir "${{ steps.firmware_dir.outputs.path }}/dist"

      - name: Create firmware bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.firmware_dir.outputs.path }}"
          bundle_name="${{ steps.version.outputs.bundle }}"
          rm -f "${bundle_name}"
          (cd dist && zip -r "../${bundle_name}" .)
          echo "path=${{ steps.firmware_dir.outputs.path }}/${bundle_name}" >> "${GITHUB_OUTPUT}"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'server-v*' --sort=-creatordate | head -n1 || true)"
          if [ -z "${latest_tag}" ]; then
            range="HEAD"
          else
            range="${latest_tag}..HEAD"
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "## Changes"
            echo ""
             git log --oneline --no-decorate --max-count=50 "${range}"
             echo ""
             echo "CHANGELOG_EOF"
           } >> "${GITHUB_OUTPUT}"

      - name: Install Playwright browser
        working-directory: apps/ui
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install chromium

      - name: Generate wiki screenshots
        working-directory: apps/ui
        env:
          WIKI_SCREENSHOT_DIR: ${{ runner.temp }}/wiki-images/images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${WIKI_SCREENSHOT_DIR}"
          npm run wiki:screenshots

      - name: Upload wiki screenshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: wiki-screenshots-${{ steps.version.outputs.version }}
          path: ${{ runner.temp }}/wiki-images/images
          if-no-files-found: error
          retention-days: 14

      - name: Create combined Wheel / ESP release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          ${{ steps.changelog.outputs.body }}
          EOF

          mapfile -t wheel_files < <(find apps/server/dist -maxdepth 1 -type f -name '*.whl' | sort)
          if [ "${#wheel_files[@]}" -eq 0 ]; then
            echo "No server wheel artifacts found under apps/server/dist" >&2
            exit 1
          fi

          bundle_path="${{ steps.bundle.outputs.path }}"
          if [ ! -f "${bundle_path}" ]; then
            echo "Expected release bundle is missing: ${bundle_path}" >&2
            exit 1
          fi

          release_args=()
          for wheel_file in "${wheel_files[@]}"; do
            release_args+=(--asset "${wheel_file}")
          done
          release_args+=(--asset "${bundle_path}")

          python3 tools/publish_github_release.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.version.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "Wheel / ESP release ${{ steps.version.outputs.version }}" \
            --notes-file "${notes_file}" \
            "${release_args[@]}"

      - name: Publish GitHub wiki screenshots
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/wiki/publish_wiki.py \
            --source-dir "${{ runner.temp }}/wiki-images" \
            --repo "${{ github.repository }}" \
            --preserve-existing \
            --commit-message "docs(wiki): refresh screenshots for release ${{ steps.version.outputs.version }}"

      - name: Remove superseded Wheel / ESP releases
        uses: actions/github-script@v8
        env:
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
          WHEEL_ESP_RELEASE_TITLE_PREFIX: Wheel / ESP release
        with:
          script: |
            const currentTag = process.env.CURRENT_TAG;
            const releaseTitlePrefix = `${process.env.WHEEL_ESP_RELEASE_TITLE_PREFIX} `;
            const legacyTitlePrefix = "Release ";
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const release of releases) {
              const tag = release.tag_name || "";
              const title = release.name || "";
              if (tag === currentTag) {
                continue;
              }
              if (!tag.startsWith("server-v")) {
                continue;
              }
              if (
                !title.startsWith(releaseTitlePrefix) &&
                !title.startsWith(legacyTitlePrefix)
              ) {
                core.info(`Skipping ${tag} because it is not a Wheel / ESP release`);
                continue;
              }

              core.info(`Deleting superseded Wheel / ESP release ${tag}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                core.warning(`Tag ${tag} was already absent`);
              }
            }
