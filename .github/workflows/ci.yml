name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci-scope:
    name: CI scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_docs_lint: ${{ steps.scope.outputs.run_docs_lint }}
      run_repo_hygiene: ${{ steps.scope.outputs.run_repo_hygiene }}
      run_shell_lint: ${{ steps.scope.outputs.run_shell_lint }}
      run_backend_lint: ${{ steps.scope.outputs.run_backend_lint }}
      run_backend_static_guards: ${{ steps.scope.outputs.run_backend_static_guards }}
      run_backend_preflight: ${{ steps.scope.outputs.run_backend_preflight }}
      run_backend_contract_drift: ${{ steps.scope.outputs.run_backend_contract_drift }}
      run_backend_typecheck: ${{ steps.scope.outputs.run_backend_typecheck }}
      run_frontend_typecheck: ${{ steps.scope.outputs.run_frontend_typecheck }}
      run_ui_smoke: ${{ steps.scope.outputs.run_ui_smoke }}
      run_backend_tests: ${{ steps.scope.outputs.run_backend_tests }}
      run_release_smoke: ${{ steps.scope.outputs.run_release_smoke }}
      run_firmware_native_tests: ${{ steps.scope.outputs.run_firmware_native_tests }}
      run_e2e: ${{ steps.scope.outputs.run_e2e }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up configured Python runtime
        id: setup-python
        uses: ./.github/actions/setup-python

      - name: Determine changed-file CI scope
        id: scope
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: >-
          "${{ steps.setup-python.outputs.python-path }}"
          tools/tests/ci_changed_scope.py --github-output "$GITHUB_OUTPUT"

  backend-lint:
    name: Backend lint
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_backend_lint == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-backend

      - name: Ruff check
        run: python -m ruff check apps/server/vibesensor apps/server/tests tools

      - name: Ruff format check
        run: python -m ruff format --check apps/server/vibesensor apps/server/tests tools

  repo-hygiene:
    name: Repo hygiene
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_repo_hygiene == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-backend

      - name: Repo hygiene checks
        run: |
          python tools/dev/check_hygiene.py
          python tools/dev/loc_check.py

  shell-lint:
    name: Shell lint
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_shell_lint == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck deployment scripts
        run: make shell-lint

  backend-static-guards:
    name: Backend static guards
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_backend_static_guards == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-backend

      - name: Backend architecture checks
        working-directory: apps/server
        run: |
          lint-imports --config pyproject.toml
          python ../../tools/dev/verify_backend_static_guards.py

  backend-preflight:
    name: Backend preflight
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_backend_preflight == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-backend

      - name: Validate dependency consistency
        run: python -m pip check

      - name: Validate declared Python dependencies
        working-directory: apps/server
        run: deptry . tests --config pyproject.toml

      - name: Config preflight (dev)
        run: python -m vibesensor.cli.preflight apps/server/config.dev.yaml

      - name: Config preflight (docker)
        run: python -m vibesensor.cli.preflight apps/server/config.docker.yaml

      - name: Config preflight (pi)
        run: python -m vibesensor.cli.preflight apps/server/config.pi.yaml

  docs-lint:
    name: Docs lint
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_docs_lint == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - id: setup-python
        uses: ./.github/actions/setup-python

      - name: Docs lint
        run: >-
          "${{ steps.setup-python.outputs.python-path }}"
          tools/dev/docs_lint.py

  backend-contract-drift:
    name: Backend contract drift
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_backend_contract_drift == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - id: setup-backend
        uses: ./.github/actions/setup-backend

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        working-directory: apps/ui
        run: node ../../tools/ui/ensure_ui_bootstrap.mjs

      - name: Materialize missing UI generated contract derivatives
        working-directory: apps/ui
        env:
          PYTHON: ${{ steps.setup-backend.outputs.python-path }}
        run: npm run setup:generated-contracts

      - name: Authoritative contract sync check
        run: make sync-contracts CHECK=1

  backend-typecheck:
    name: Backend type check
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_backend_typecheck == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-backend

      - name: Mypy backend enforced coverage
        working-directory: apps/server
        env:
          MYPYPATH: .
        run: python -m mypy --config-file pyproject.toml

  frontend-quality:
    name: Frontend quality
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_frontend_typecheck == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        working-directory: apps/ui
        run: node ../../tools/ui/ensure_ui_bootstrap.mjs

      - name: UI lint
        working-directory: apps/ui
        run: npm run lint

      - name: UI dependency boundary checks
        working-directory: apps/ui
        run: npm run lint:deps

      - name: UI dead code checks
        working-directory: apps/ui
        run: npm run lint:unused

  frontend-typecheck:
    name: Frontend type check
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_frontend_typecheck == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - id: setup-python
        uses: ./.github/actions/setup-python

      - name: Install UI dependencies
        working-directory: apps/ui
        run: node ../../tools/ui/ensure_ui_bootstrap.mjs

      - name: Sync generated UI contract derivatives
        working-directory: apps/ui
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: npm run sync:generated-contracts

      - name: UI typecheck
        working-directory: apps/ui
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: npm run typecheck

      - name: UI test typecheck
        working-directory: apps/ui
        run: npm run typecheck:tests

  ui-unit:
    name: UI unit tests
    needs:
      - ci-scope
      - frontend-typecheck
    if: >-
      ${{
        needs.ci-scope.outputs.run_frontend_typecheck == 'true' &&
        needs.frontend-typecheck.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - id: setup-python
        uses: ./.github/actions/setup-python

      - name: Install UI dependencies
        working-directory: apps/ui
        run: node ../../tools/ui/ensure_ui_bootstrap.mjs

      - name: UI Vitest unit suite
        working-directory: apps/ui
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: npm run test:unit

      - name: Upload UI unit test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-unit-test-artifacts
          path: apps/ui/test-results/
          if-no-files-found: ignore
          retention-days: 7

  ui-smoke:
    name: UI smoke tests
    needs:
      - ci-scope
      - frontend-typecheck
    if: >-
      ${{
        needs.ci-scope.outputs.run_ui_smoke == 'true' &&
        needs.frontend-typecheck.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - id: setup-python
        uses: ./.github/actions/setup-python

      - id: playwright-browser-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('apps/ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install UI dependencies
        working-directory: apps/ui
        run: node ../../tools/ui/ensure_ui_bootstrap.mjs

      - name: Install Playwright Chromium (cache miss)
        if: ${{ steps.playwright-browser-cache.outputs.cache-hit != 'true' }}
        working-directory: apps/ui
        run: npx playwright install chromium

      - name: UI smoke tests
        working-directory: apps/ui
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          PLAYWRIGHT_SMOKE_WORKERS: 4
        run: npm run test:smoke

      - name: Upload UI smoke test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-smoke-test-artifacts
          path: apps/ui/test-results/playwright-smoke/
          if-no-files-found: ignore
          retention-days: 5

  ui-build-artifact:
    name: UI build artifact
    needs:
      - ci-scope
      - frontend-typecheck
    if: >-
      ${{
        always() &&
        needs.ci-scope.outputs.run_release_smoke == 'true' &&
        needs.frontend-typecheck.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Set up configured Python runtime
        id: setup-python
        uses: ./.github/actions/setup-python

      - name: Build release-smoke UI static artifact
        run: >-
          "${{ steps.setup-python.outputs.python-path }}"
          tools/build_ui_static.py --skip-typecheck --assume-prevalidated-contracts

      - name: Package release-smoke UI static artifact
        run: |
          mkdir -p artifacts/release-smoke
          tar -C apps/server/vibesensor/static -czf artifacts/release-smoke/ui-static.tar.gz .

      - name: Upload release-smoke UI static artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-smoke-ui-static
          path: artifacts/release-smoke/ui-static.tar.gz
          if-no-files-found: error
          retention-days: 1

  release-smoke:
    name: Release smoke
    needs:
      - ci-scope
      - backend-lint
      - repo-hygiene
      - backend-static-guards
      - backend-preflight
      - docs-lint
      - backend-contract-drift
      - backend-typecheck
      - frontend-quality
      - frontend-typecheck
      - ui-build-artifact
    if: >-
      ${{
        always() &&
        needs.ci-scope.outputs.run_release_smoke == 'true' &&
        needs.backend-lint.result != 'failure' &&
        needs.repo-hygiene.result != 'failure' &&
        needs.backend-static-guards.result != 'failure' &&
        needs.backend-preflight.result != 'failure' &&
        needs.docs-lint.result != 'failure' &&
        needs.backend-contract-drift.result != 'failure' &&
        needs.backend-typecheck.result != 'failure' &&
        needs.frontend-quality.result != 'failure' &&
        needs.frontend-typecheck.result != 'failure' &&
        needs.ui-build-artifact.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up configured Python runtime
        id: setup-python
        uses: ./.github/actions/setup-python

      - name: Download release-smoke UI static artifact
        uses: actions/download-artifact@v8
        with:
          name: release-smoke-ui-static
          path: artifacts/release-smoke

      - name: Restore release-smoke UI static artifact
        run: |
          rm -rf apps/server/vibesensor/static
          mkdir -p apps/server/vibesensor/static
          tar -xzf artifacts/release-smoke/ui-static.tar.gz -C apps/server/vibesensor/static

      - name: Release smoke validation
        run: >-
          "${{ steps.setup-python.outputs.python-path }}"
          tools/tests/run_release_smoke.py --skip-ui-build

  firmware-native-tests:
    name: Firmware native tests
    needs:
      - ci-scope
      - backend-lint
      - repo-hygiene
      - backend-static-guards
      - backend-preflight
      - docs-lint
      - backend-contract-drift
    if: >-
      ${{
        always() &&
        needs.ci-scope.outputs.run_firmware_native_tests == 'true' &&
        needs.backend-lint.result != 'failure' &&
        needs.repo-hygiene.result != 'failure' &&
        needs.backend-static-guards.result != 'failure' &&
        needs.backend-preflight.result != 'failure' &&
        needs.docs-lint.result != 'failure' &&
        needs.backend-contract-drift.result != 'failure'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-backend
        with:
          include-platformio: "true"

      - name: Verify firmware protocol fixtures
        run: python tools/firmware/generate_protocol_contract_fixtures.py --check

      - name: Firmware native tests
        working-directory: firmware/esp
        run: pio test -e native

  backend-tests:
    name: Backend tests (shard ${{ matrix.shard_label }})
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_backend_tests == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - logical_job_name: "backend-tests-1"
            shard_label: "1/5"
            shard_index: 1
            cache_suffix: 1
            junitxml: "artifacts/ai/logs/ci/backend-tests-1.xml"
            artifact_name: "backend-test-artifacts-1"
          - logical_job_name: "backend-tests-2"
            shard_label: "2/5"
            shard_index: 2
            cache_suffix: 2
            junitxml: "artifacts/ai/logs/ci/backend-tests-2.xml"
            artifact_name: "backend-test-artifacts-2"
          - logical_job_name: "backend-tests-3"
            shard_label: "3/5"
            shard_index: 3
            cache_suffix: 3
            junitxml: "artifacts/ai/logs/ci/backend-tests-3.xml"
            artifact_name: "backend-test-artifacts-3"
          - logical_job_name: "backend-tests-4"
            shard_label: "4/5"
            shard_index: 4
            cache_suffix: 4
            junitxml: "artifacts/ai/logs/ci/backend-tests-4.xml"
            artifact_name: "backend-test-artifacts-4"
          - logical_job_name: "backend-tests-5"
            shard_label: "5/5"
            shard_index: 5
            cache_suffix: 5
            junitxml: "artifacts/ai/logs/ci/backend-tests-5.xml"
            artifact_name: "backend-test-artifacts-5"

    steps:
      - uses: actions/checkout@v6

      - name: Set up configured backend Python runtime
        id: setup-backend
        uses: ./.github/actions/setup-backend

      - uses: actions/cache@v5
        with:
          path: ~/.cache/vibesensor/backend-duration-cache.json
          # Keep each run's write key distinct while still restoring from the stable test-history prefix.
          key: ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-${{ matrix.cache_suffix }}-${{ github.run_id }}
          # Avoid restoring duration caches from older test-suite hashes: stale timings can
          # rebalance whole-file shards badly enough to trip the 15-minute backend-test timeout.
          restore-keys: |
            ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-

      - name: Prepare backend test artifacts
        run: mkdir -p artifacts/ai/logs/ci

      - name: Backend tests shard ${{ matrix.shard_label }}
        env:
          VIBESENSOR_BACKEND_XDIST_WORKERS: "3"
        run: >-
          "${{ steps.setup-backend.outputs.python-path }}"
          tools/tests/run_backend_parallel.py --shards 5 --shard-index ${{ matrix.shard_index }}
          --junitxml ${{ matrix.junitxml }}

      - name: Upload backend test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/ai/logs/ci/
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: E2E
    needs:
      - ci-scope
    if: ${{ needs.ci-scope.outputs.run_e2e == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up configured backend Python runtime
        id: setup-backend
        uses: ./.github/actions/setup-backend

      - uses: actions/cache@v5
        with:
          path: ~/.cache/vibesensor/e2e-duration-cache.json
          key: ${{ runner.os }}-e2e-durations-${{ hashFiles('tools/tests/run_e2e_parallel.py', 'apps/server/tests_e2e/**/*.py') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-e2e-durations-${{ hashFiles('tools/tests/run_e2e_parallel.py', 'apps/server/tests_e2e/**/*.py') }}-
            ${{ runner.os }}-e2e-durations-

      - name: Process-backed e2e suite (skip already-owned checks)
        run: >-
          "${{ steps.setup-backend.outputs.python-path }}"
          tools/tests/run_e2e_parallel.py --fast-e2e --shards 6

      - name: Upload e2e failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-artifacts
          path: artifacts/ai/logs/e2e_parallel/
          if-no-files-found: ignore
          retention-days: 7
