name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend quality (lint + preflight)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - name: Validate dependency consistency
        run: |
          python -m pip check

      - name: Backend quality checks
        run: make lint

  backend-typecheck:
    name: Backend type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - name: Mypy backend enforced coverage
        working-directory: apps/server
        env:
          MYPYPATH: .
        run: |
          python -m mypy --config-file pyproject.toml

  frontend-typecheck:
    name: Frontend type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        run: |
          cd apps/ui && npm ci

      - name: UI contract sync check
        run: |
          cd apps/ui
          npm run check:contracts

      - name: UI lint
        run: |
          cd apps/ui
          npm run lint

      - name: UI typecheck
        run: |
          cd apps/ui
          npm run typecheck

  ui-smoke:
    name: UI smoke tests
    needs:
      - frontend-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('apps/ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install UI dependencies
        run: |
          cd apps/ui && npm ci

      - name: UI smoke tests
        run: |
          cd apps/ui
          npx playwright install chromium
          npm run test:smoke

  release-smoke:
    name: Release smoke
    needs:
      - backend-quality
      - backend-typecheck
      - frontend-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Release smoke validation
        run: |
          python3 tools/tests/run_release_smoke.py

  firmware-native-tests:
    name: Firmware native tests
    needs:
      - backend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend
        with:
          include-platformio: "true"

      - name: Verify firmware protocol fixtures
        run: |
          python tools/firmware/generate_protocol_contract_fixtures.py --check

      - name: Firmware native tests
        run: |
          cd firmware/esp
          pio test -e native

  backend-tests-1:
    name: Backend tests (shard 1/5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - uses: actions/cache@v5
        with:
          path: ~/.cache/vibesensor/backend-duration-cache.json
          key: ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-1-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-
            ${{ runner.os }}-backend-test-durations-

      - name: Prepare backend test artifacts
        run: |
          mkdir -p artifacts/ai/logs/ci

      - name: Backend tests shard 1/5
        run: |
          python3 tools/tests/run_backend_parallel.py --shards 5 --shard-index 1 --junitxml artifacts/ai/logs/ci/backend-tests-1.xml

      - name: Upload backend test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-artifacts-1
          path: artifacts/ai/logs/ci/
          if-no-files-found: ignore
          retention-days: 7

  backend-tests-2:
    name: Backend tests (shard 2/5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - uses: actions/cache@v5
        with:
          path: ~/.cache/vibesensor/backend-duration-cache.json
          key: ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-
            ${{ runner.os }}-backend-test-durations-

      - name: Prepare backend test artifacts
        run: |
          mkdir -p artifacts/ai/logs/ci

      - name: Backend tests shard 2/5
        run: |
          python3 tools/tests/run_backend_parallel.py --shards 5 --shard-index 2 --junitxml artifacts/ai/logs/ci/backend-tests-2.xml

      - name: Upload backend test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-artifacts-2
          path: artifacts/ai/logs/ci/
          if-no-files-found: ignore
          retention-days: 7

  backend-tests-3:
    name: Backend tests (shard 3/5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - uses: actions/cache@v5
        with:
          path: ~/.cache/vibesensor/backend-duration-cache.json
          key: ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-3-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-
            ${{ runner.os }}-backend-test-durations-

      - name: Prepare backend test artifacts
        run: |
          mkdir -p artifacts/ai/logs/ci

      - name: Backend tests shard 3/5
        run: |
          python3 tools/tests/run_backend_parallel.py --shards 5 --shard-index 3 --junitxml artifacts/ai/logs/ci/backend-tests-3.xml

      - name: Upload backend test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-artifacts-3
          path: artifacts/ai/logs/ci/
          if-no-files-found: ignore
          retention-days: 7

  backend-tests-4:
    name: Backend tests (shard 4/5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - uses: actions/cache@v5
        with:
          path: ~/.cache/vibesensor/backend-duration-cache.json
          key: ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-4-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-
            ${{ runner.os }}-backend-test-durations-

      - name: Prepare backend test artifacts
        run: |
          mkdir -p artifacts/ai/logs/ci

      - name: Backend tests shard 4/5
        run: |
          python3 tools/tests/run_backend_parallel.py --shards 5 --shard-index 4 --junitxml artifacts/ai/logs/ci/backend-tests-4.xml

      - name: Upload backend test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-artifacts-4
          path: artifacts/ai/logs/ci/
          if-no-files-found: ignore
          retention-days: 7

  backend-tests-5:
    name: Backend tests (shard 5/5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - uses: actions/cache@v5
        with:
          path: ~/.cache/vibesensor/backend-duration-cache.json
          key: ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-5-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-backend-test-durations-${{ hashFiles('tools/tests/run_backend_parallel.py', 'apps/server/tests/**/*.py') }}-
            ${{ runner.os }}-backend-test-durations-

      - name: Prepare backend test artifacts
        run: |
          mkdir -p artifacts/ai/logs/ci

      - name: Backend tests shard 5/5
        run: |
          python3 tools/tests/run_backend_parallel.py --shards 5 --shard-index 5 --junitxml artifacts/ai/logs/ci/backend-tests-5.xml

      - name: Upload backend test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-artifacts-5
          path: artifacts/ai/logs/ci/
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: E2E (docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - uses: docker/setup-buildx-action@v4

      - uses: actions/cache@v5
        with:
          path: ~/.cache/vibesensor/e2e-duration-cache.json
          key: ${{ runner.os }}-e2e-durations-${{ hashFiles('tools/tests/run_e2e_parallel.py', 'apps/server/tests_e2e/**/*.py') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-e2e-durations-${{ hashFiles('tools/tests/run_e2e_parallel.py', 'apps/server/tests_e2e/**/*.py') }}-
            ${{ runner.os }}-e2e-durations-

      - name: Prebuild cached E2E image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/Dockerfile.e2e
          tags: vibesensor-full-suite:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker-backed e2e suite (skip already-owned checks)
        run: |
          python3 tools/tests/run_e2e_parallel.py --fast-e2e --shards 6

      - name: Upload e2e failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-artifacts
          path: artifacts/ai/logs/e2e_parallel/
          if-no-files-found: ignore
          retention-days: 7
