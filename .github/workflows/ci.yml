name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend quality (lint + preflight)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev]"

      - name: Backend quality checks
        run: make lint

  backend-typecheck:
    name: Backend type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev]"

      - name: Mypy backend enforced coverage
        working-directory: apps/server
        env:
          MYPYPATH: .
        run: |
          python -m mypy --config-file pyproject.toml

  frontend-typecheck:
    name: Frontend type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        run: |
          cd apps/ui && npm ci

      - name: UI contract sync check
        run: |
          cd apps/ui
          npm run check:contracts

      - name: UI typecheck
        run: |
          cd apps/ui
          npm run typecheck

  ui-smoke:
    name: UI smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        run: |
          cd apps/ui && npm ci

      - name: UI smoke tests
        run: |
          cd apps/ui
          npx playwright install chromium
          npm run test:smoke

  release-smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Release smoke validation
        run: |
          python3 tools/tests/run_release_smoke.py

  firmware-native-tests:
    name: Firmware native tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev]" "platformio>=6,<7"

      - name: Verify firmware protocol fixtures
        run: |
          python tools/firmware/generate_protocol_contract_fixtures.py --check

      - name: Firmware native tests
        run: |
          cd firmware/esp
          pio test -e native

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev]"

      - name: Backend tests
        run: |
          python -m pytest -q --tb=short apps/server/tests

  e2e:
    name: E2E (docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev]"

      - name: Docker-backed e2e suite (skip already-owned checks)
        run: |
          python3 tools/tests/run_e2e_parallel.py --fast-e2e
