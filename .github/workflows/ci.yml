name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend quality (lint + preflight)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev]"

      - name: Ruff check
        run: |
          ruff check apps/server/vibesensor apps/server/tests tools

      - name: Ruff format check
        run: |
          ruff format --check apps/server/vibesensor apps/server/tests tools

      - name: Hygiene checks
        run: |
          python tools/dev/check_hygiene.py

      - name: Config preflight
        run: |
          vibesensor-config-preflight apps/server/config.example.yaml
          vibesensor-config-preflight apps/server/config.dev.yaml
          vibesensor-config-preflight apps/server/config.docker.yaml
          vibesensor-config-preflight apps/server/config.pi.yaml

      - name: Docs lint
        run: |
          python tools/dev/docs_lint.py

      - name: WS payload schema sync check
        run: |
          python -m vibesensor.ws_schema_export --check

      - name: HTTP API schema sync check
        run: |
          python -m vibesensor.http_api_schema_export --check

  backend-typecheck:
    name: Backend type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev]"

      - name: Mypy backend enforced coverage
        working-directory: apps/server
        env:
          MYPYPATH: .
        run: |
          python -m mypy --config-file pyproject.toml

  frontend-typecheck:
    name: Frontend type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        run: |
          cd apps/ui && npm ci

      - name: UI contract sync check
        run: |
          cd apps/ui
          npm run check:contracts

      - name: UI typecheck
        run: |
          cd apps/ui
          npm run typecheck

  ui-smoke:
    name: UI smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - frontend-typecheck

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        run: |
          cd apps/ui && npm ci

      - name: UI smoke tests
        run: |
          cd apps/ui
          npx playwright install chromium
          npm run test:smoke

  release-smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-quality
      - backend-typecheck
      - frontend-typecheck

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Release smoke validation
        run: |
          python3 tools/tests/run_release_smoke.py

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - backend-quality
      - backend-typecheck

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev,ocr]"

      - name: Backend tests (non-selenium)
        run: |
          python -m pytest -q -m "not selenium" --tb=short apps/server/tests

  e2e:
    name: E2E (docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - backend-quality
      - backend-typecheck
      - frontend-typecheck

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/server[dev]"

      - name: Docker-backed e2e suite (skip already-owned checks)
        run: |
          python3 tools/tests/run_e2e_parallel.py --shards 3 --fast-e2e
