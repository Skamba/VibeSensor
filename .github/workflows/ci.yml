name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend quality (lint + preflight)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - name: Validate dependency consistency
        run: |
          python -m pip check

      - name: Backend quality checks
        run: make lint

  backend-typecheck:
    name: Backend type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - name: Mypy backend enforced coverage
        working-directory: apps/server
        env:
          MYPYPATH: .
        run: |
          python -m mypy --config-file pyproject.toml

  frontend-typecheck:
    name: Frontend type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        run: |
          cd apps/ui && npm ci

      - name: UI contract sync check
        run: |
          cd apps/ui
          npm run check:contracts

      - name: UI typecheck
        run: |
          cd apps/ui
          npm run typecheck

  ui-smoke:
    name: UI smoke tests
    needs:
      - frontend-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('apps/ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install UI dependencies
        run: |
          cd apps/ui && npm ci

      - name: UI smoke tests
        run: |
          cd apps/ui
          npx playwright install chromium
          npm run test:smoke

  release-smoke:
    name: Release smoke
    needs:
      - backend-quality
      - backend-typecheck
      - frontend-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: apps/server/pyproject.toml

      - name: Release smoke validation
        run: |
          python3 tools/tests/run_release_smoke.py

  firmware-native-tests:
    name: Firmware native tests
    needs:
      - backend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend
        with:
          include-platformio: "true"

      - name: Verify firmware protocol fixtures
        run: |
          python tools/firmware/generate_protocol_contract_fixtures.py --check

      - name: Firmware native tests
        run: |
          cd firmware/esp
          pio test -e native

  backend-tests:
    name: Backend tests
    needs:
      - backend-quality
      - backend-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - name: Prepare backend test artifacts
        run: |
          mkdir -p artifacts/ai/logs/ci

      - name: Backend tests
        run: |
          python -m pytest -q --tb=short --junitxml artifacts/ai/logs/ci/backend-tests.xml apps/server/tests

      - name: Upload backend test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: artifacts/ai/logs/ci/
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: E2E (docker)
    needs:
      - backend-quality
      - backend-typecheck
      - frontend-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-backend

      - uses: docker/setup-buildx-action@v3

      - name: Prebuild cached E2E image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          tags: vibesensor-full-suite:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker-backed e2e suite (skip already-owned checks)
        run: |
          python3 tools/tests/run_e2e_parallel.py --fast-e2e

      - name: Upload e2e failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: artifacts/ai/logs/e2e_parallel/
          if-no-files-found: ignore
          retention-days: 7
