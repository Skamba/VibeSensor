name: Weekly Pi Image

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-pi-image
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute weekly image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          build_label="$(date -u +%y-%m-%d)"
          {
            echo "build_label=${build_label}"
            echo "tag=weekly-pi-image"
            echo "release_name=Weekly Pi Image ${build_label}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: apps/server/pyproject.toml

      - name: Install Pi image build prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-user qemu-user-static rsync xz-utils

      - name: Build Pi image
        shell: bash
        run: |
          set -euo pipefail
          ./infra/pi-image/pi-gen/build.sh

      - name: Collect weekly release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          out_dir="infra/pi-image/pi-gen/out"
          release_dir="${RUNNER_TEMP}/weekly-pi-image"
          mkdir -p "${release_dir}"

          artifact="$(find "${out_dir}" -maxdepth 1 -type f \
            -name "image_*-vibesensor-lite*.zip" \
            | sort | tail -n 1 || true)"
          if [ -z "${artifact}" ]; then
            echo "No Pi image artifact found in ${out_dir}" >&2
            exit 1
          fi

          short_date="$(date -u +%y-%m-%d)"
          release_artifact="${release_dir}/VibeSensor-${short_date}.img.zip"
          cp "${artifact}" "${release_artifact}"

          sha_file="${release_artifact}.sha256"
          sha256sum "${release_artifact}" > "${sha_file}"

          version_info_source="${out_dir}/$(basename "${artifact}").version.txt"
          version_info_target="${release_dir}/VibeSensor-${short_date}.img.zip.version.txt"
          if [ -f "${version_info_source}" ]; then
            cp "${version_info_source}" "${version_info_target}"
          else
            cat > "${version_info_target}" <<EOF
          git_sha=${GITHUB_SHA}
          git_ref=${GITHUB_REF}
          source_artifact=$(basename "${artifact}")
          EOF
          fi
          echo "published_artifact=VibeSensor-${short_date}.img.zip" >> "${version_info_target}"
          {
            echo "workflow_name=${GITHUB_WORKFLOW}"
            echo "runner_label=ubuntu-24.04-arm"
            echo "run_id=${GITHUB_RUN_ID}"
          } >> "${version_info_target}"

          echo "release_dir=${release_dir}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=VibeSensor-${short_date}.img.zip" >> "${GITHUB_OUTPUT}"

      - name: Upload weekly image workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: weekly-pi-image-${{ steps.metadata.outputs.build_label }}
          path: ${{ steps.assets.outputs.release_dir }}/*
          if-no-files-found: error
          retention-days: 21

      - name: Delete previous weekly Pi image releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq '.[] | select(.tag_name == "weekly-pi-image" or (.tag_name | startswith("pi-image-v"))) | .tag_name' \
            | while IFS= read -r tag; do
                if [ -n "${tag}" ]; then
                  gh release delete "${tag}" --yes --cleanup-tag
                fi
              done

      - name: Publish weekly Pi image release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          Automated weekly Raspberry Pi image snapshot from \`main\`.

          - Commit: \`${GITHUB_SHA}\`
          - Build label: \`${{ steps.metadata.outputs.build_label }}\`
          - Asset: \`${{ steps.assets.outputs.artifact_name }}\`
          - Flash the image with Raspberry Pi Imager after downloading the release asset.

          This workflow reuses \`infra/pi-image/pi-gen/build.sh\` so the weekly image follows the same supported image-build path as local builds.
          Before publishing, it deletes the previous weekly Pi image release so the Releases overview only shows the latest Pi image snapshot.
          EOF

          mapfile -t release_files < <(find "${{ steps.assets.outputs.release_dir }}" -maxdepth 1 -type f | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No weekly release assets found under ${{ steps.assets.outputs.release_dir }}" >&2
            exit 1
          fi

          release_args=()
          for release_file in "${release_files[@]}"; do
            release_args+=(--asset "${release_file}")
          done

          python3 tools/publish_github_release.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.metadata.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.metadata.outputs.release_name }}" \
            --notes-file "${notes_file}" \
            --make-latest false \
            "${release_args[@]}"
