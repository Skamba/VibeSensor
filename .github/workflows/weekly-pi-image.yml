name: Weekly Pi Image

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-pi-image
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute weekly source SHA
        id: source
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Compute weekly image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          build_label="$(date -u +%y-%m-%d)"
          {
            echo "build_label=${build_label}"
            echo "tag=weekly-pi-image"
            echo "release_name=Weekly Pi Image ${build_label}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build weekly Pi image workflow artifact
        id: build-image
        uses: ./.github/actions/build-pi-image
        with:
          release-dir-name: weekly-pi-image
          release-artifact-name: VibeSensor-${{ steps.metadata.outputs.build_label }}.img.zip
          workflow-artifact-name: weekly-pi-image-${{ steps.metadata.outputs.build_label }}
          include-published-artifact: "true"

      - name: Delete previous weekly Pi image releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq '.[] | select(.tag_name == "weekly-pi-image" or (.tag_name | startswith("pi-image-v"))) | .tag_name' \
            | while IFS= read -r tag; do
                if [ -n "${tag}" ]; then
                  gh release delete "${tag}" --yes --cleanup-tag
                fi
              done

      - name: Publish weekly Pi image release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          Automated weekly Raspberry Pi image snapshot from \`main\`.

          - Commit: \`${{ steps.source.outputs.sha }}\`
          - Build label: \`${{ steps.metadata.outputs.build_label }}\`
          - Asset: \`${{ steps.build-image.outputs.release-artifact-name }}\`
          - Flash the image with Raspberry Pi Imager after downloading the release asset.

          This workflow reuses \`infra/pi-image/pi-gen/build.sh\` so the weekly image follows the same supported image-build path as local builds.
          Before publishing, it deletes the previous weekly Pi image release so the Releases overview only shows the latest Pi image snapshot.
          EOF

          mapfile -t release_files < <(find "${{ steps.build-image.outputs.release-dir }}" -maxdepth 1 -type f | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No weekly release assets found under ${{ steps.build-image.outputs.release-dir }}" >&2
            exit 1
          fi

          release_args=()
          for release_file in "${release_files[@]}"; do
            release_args+=(--asset "${release_file}")
          done

          python_bin="${{ steps.build-image.outputs.python-path }}"
          "${python_bin}" tools/publish_github_release.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.metadata.outputs.tag }}" \
            --target "${{ steps.source.outputs.sha }}" \
            --title "${{ steps.metadata.outputs.release_name }}" \
            --notes-file "${notes_file}" \
            --make-latest false \
            "${release_args[@]}"
