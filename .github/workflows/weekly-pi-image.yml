name: Weekly Pi Image

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-pi-image
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute weekly image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          build_label="$(date -u +%y-%m-%d)"
          {
            echo "build_label=${build_label}"
            echo "tag=weekly-pi-image"
            echo "release_name=Weekly Pi Image ${build_label}"
            echo "published_artifact=VibeSensor-${build_label}.img.bz2"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: apps/server/pyproject.toml

      - name: Restore Yocto downloads cache
        uses: actions/cache@v4
        with:
          path: infra/pi-image/yocto/.build/downloads
          key: yocto-downloads-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('infra/pi-image/yocto/kas/*.yml', 'infra/pi-image/yocto/meta-vibesensor/**', 'infra/pi-image/yocto/build.sh', 'apps/server/pyproject.toml', 'apps/ui/package-lock.json') }}
          restore-keys: |
            yocto-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore Yocto sstate cache
        uses: actions/cache@v4
        with:
          path: infra/pi-image/yocto/.build/sstate-cache
          key: yocto-sstate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('infra/pi-image/yocto/kas/*.yml', 'infra/pi-image/yocto/meta-vibesensor/**', 'infra/pi-image/yocto/build.sh', 'apps/server/pyproject.toml', 'apps/ui/package-lock.json') }}
          restore-keys: |
            yocto-sstate-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Yocto build prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bzip2 chrpath cpio diffstat dosfstools file gawk git iproute2 \
            iputils-ping locales mtools openssl parted rsync sudo texinfo \
            unzip wget xz-utils zstd
          sudo locale-gen en_US.UTF-8
          {
            echo "LANG=en_US.UTF-8"
            echo "LC_ALL=en_US.UTF-8"
          } >> "${GITHUB_ENV}"
          python3 -m pip install --upgrade pip
          python3 -m pip install "kas>=4,<5" "build>=1,<2"

      - name: Build Pi image
        shell: bash
        run: |
          set -euo pipefail
          BUILD_LABEL="${{ steps.metadata.outputs.build_label }}" ./infra/pi-image/yocto/build.sh

      - name: Collect weekly release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          out_dir="infra/pi-image/yocto/out"
          release_dir="${RUNNER_TEMP}/weekly-pi-image"
          mkdir -p "${release_dir}"

          artifact="$(find "${out_dir}" -maxdepth 1 -type f \
            -name "image_*vibesensor-rpi-universal.wic.bz2" \
            | sort | tail -n 1 || true)"
          if [ -z "${artifact}" ]; then
            echo "No Pi image artifact found in ${out_dir}" >&2
            exit 1
          fi

          short_date="${{ steps.metadata.outputs.build_label }}"
          release_artifact="${release_dir}/VibeSensor-${short_date}.img.bz2"
          cp "${artifact}" "${release_artifact}"

          sha_file="${release_artifact}.sha256"
          sha256sum "${release_artifact}" > "${sha_file}"

          version_info_target="${release_dir}/VibeSensor-${short_date}.img.bz2.version.txt"
          cat > "${version_info_target}" <<EOF
          git_sha=${GITHUB_SHA}
          git_ref=${GITHUB_REF}
          source_artifact=$(basename "${artifact}")
          EOF
          echo "published_artifact=VibeSensor-${short_date}.img.bz2" >> "${version_info_target}"
          echo "build_path=infra/pi-image/yocto/build.sh" >> "${version_info_target}"

          manifest_source="${artifact}.manifest.json"
          if [ -f "${manifest_source}" ]; then
            cp "${manifest_source}" "${release_dir}/VibeSensor-${short_date}.img.bz2.manifest.json"
          fi

          echo "release_dir=${release_dir}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=VibeSensor-${short_date}.img.bz2" >> "${GITHUB_OUTPUT}"

      - name: Upload weekly image workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: weekly-pi-image-${{ steps.metadata.outputs.build_label }}
          path: ${{ steps.assets.outputs.release_dir }}/*
          if-no-files-found: error
          retention-days: 21

      - name: Delete previous weekly Pi image releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq '.[] | select(.tag_name == "weekly-pi-image" or (.tag_name | startswith("pi-image-v"))) | .tag_name' \
            | while IFS= read -r tag; do
                if [ -n "${tag}" ]; then
                  gh release delete "${tag}" --yes --cleanup-tag
                fi
              done

      - name: Publish weekly Pi image release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          Automated weekly Raspberry Pi image snapshot from \`main\`.

          - Commit: \`${GITHUB_SHA}\`
          - Build label: \`${{ steps.metadata.outputs.build_label }}\`
          - Asset: \`${{ steps.assets.outputs.artifact_name }}\`
          - Flash the image with Raspberry Pi Imager after downloading the release asset.

          This workflow uses the supported Yocto/KAS image pipeline at \`infra/pi-image/yocto/build.sh\` to produce the universal 64-bit Raspberry Pi image for Pi 3 / 4 / 5.
          Before publishing, it deletes the previous weekly Pi image release so the Releases overview only shows the latest Pi image snapshot.
          EOF

          mapfile -t release_files < <(find "${{ steps.assets.outputs.release_dir }}" -maxdepth 1 -type f | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No weekly release assets found under ${{ steps.assets.outputs.release_dir }}" >&2
            exit 1
          fi

          release_args=()
          for release_file in "${release_files[@]}"; do
            release_args+=(--asset "${release_file}")
          done

          python3 tools/publish_github_release.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.metadata.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.metadata.outputs.release_name }}" \
            --notes-file "${notes_file}" \
            --make-latest false \
            "${release_args[@]}"
