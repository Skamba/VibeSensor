<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeSensor</title>
  </head>
  <body>
    <div class="wrap">
      <div id="appShellChromeRoot"></div>

      <section id="dashboardView" class="view active" role="tabpanel" aria-labelledby="tab-dashboard">
        <div class="dashboard-grid">
          <div id="liveOverviewRoot" class="panel card dashboard-grid__overview"></div>

          <div id="spectrumPanelRoot" class="panel card dashboard-grid__main"></div>

          <div id="loggingPanelRoot" class="panel card dashboard-grid__controls"></div>

        </div>
      </section>

      <section id="historyView" class="view" role="tabpanel" aria-labelledby="tab-history" hidden>
        <div id="historyPanelRoot" class="panel card"></div>
      </section>

      <section id="settingsView" class="view" role="tabpanel" aria-labelledby="tab-settings" hidden>
        <div id="settingsShellRoot"></div>
      </section>
    </div>
    <div id="matrixTooltip" class="matrix-tooltip"></div>
    <div id="strengthTooltip" class="matrix-tooltip strength-tooltip"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
