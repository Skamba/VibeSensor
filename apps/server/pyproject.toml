[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vibesensor"
dynamic = ["version"]
description = "Offline Raspberry Pi vibration telemetry server"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.111,<1",
  "uvicorn[standard]>=0.30,<1",
  "numpy>=1.26,<3",
  "PyYAML>=6,<7",
  "reportlab>=4,<5",
  "websockets>=12,<16",
]

[project.optional-dependencies]
esp = [
  "esptool>=4,<5",
]
ocr = [
  "pypdfium2>=4.30,<5",
  "rapidocr-onnxruntime>=1.4,<2",
]
dev = [
  "mypy>=1.19,<2",
  "pytest>=8,<9",
  "pytest-asyncio>=0.23,<1",
  "pytest-cov>=6,<7",
  "pytest-timeout>=2,<3",
  "pytest-xdist>=3.6,<4",
  "pypdf>=5,<6",
  "ruff>=0.6,<1",
]

[project.scripts]
vibesensor-server = "vibesensor.server_cli:main"
vibesensor-report = "vibesensor.report_cli:main"
vibesensor-http-api-schema-export = "vibesensor.http_api_schema_export:main"
vibesensor-hotspot-self-heal = "vibesensor.hotspot.self_heal:main"
vibesensor-sim = "vibesensor.simulator.sim_sender:main"
vibesensor-ws-smoke = "vibesensor.simulator.ws_smoke:main"
vibesensor-config-preflight = "vibesensor.config_preflight:main"
vibesensor-fw-refresh = "vibesensor.update.firmware_cache:refresh_cache_cli"
vibesensor-fw-info = "vibesensor.update.firmware_cache:cache_info_cli"
vibesensor-release-fetch = "vibesensor.update.release_fetcher:fetch_latest_wheel_cli"

[tool.setuptools.dynamic]
version = {attr = "vibesensor._version.__version__"}

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
vibesensor = ["static/**"]

[tool.setuptools.packages.find]
where = ["."]
include = ["vibesensor*"]

[tool.pytest.ini_options]
addopts = "-n auto --dist worksteal"
asyncio_mode = "auto"
timeout = 120
pythonpath = [".", "tests"]
testpaths = ["tests"]
markers = [
    "e2e: docker-based end-to-end tests",
    "long_sim: longer simulated-run tests (>20 s of synthetic data)",
    "smoke: minimal critical path checks",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
"vibesensor/report/*.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
files = [
  "vibesensor/app.py",
  "vibesensor/api_models.py",
  "vibesensor/backend_types.py",
  "vibesensor/car_library.py",
  "vibesensor/config.py",
  "vibesensor/constants.py",
  "vibesensor/contract_reference_doc.py",
  "vibesensor/domain",
  "vibesensor/exceptions.py",
  "vibesensor/gps_speed.py",
  "vibesensor/history_services",
  "vibesensor/hotspot",
  "vibesensor/http_api_schema_export.py",
  "vibesensor/json_types.py",
  "vibesensor/json_utils.py",
  "vibesensor/locations.py",
  "vibesensor/worker_pool.py",
  "vibesensor/order_bands.py",
  "vibesensor/payload_types.py",
  "vibesensor/protocol.py",
  "vibesensor/registry.py",
  "vibesensor/report",
  "vibesensor/report_cli.py",
  "vibesensor/report_i18n.py",
  "vibesensor/runtime",
  "vibesensor/routes",
  "vibesensor/run_context.py",
  "vibesensor/runlog.py",
  "vibesensor/server_cli.py",
  "vibesensor/settings_store.py",
  "vibesensor/udp_control_tx.py",
  "vibesensor/udp_data_rx.py",
  "vibesensor/update",
  "vibesensor/processing",
  "vibesensor/analysis",
  "vibesensor/analysis_settings.py",
  "vibesensor/vibration_strength.py",
  "vibesensor/strength_bands.py",
  "vibesensor/sensor_units.py",
  "vibesensor/history_db",
  "vibesensor/metrics_log",
  "vibesensor/ws_hub.py",
  "vibesensor/ws_schema_export.py",
  "vibesensor/simulator",
  "vibesensor/config_preflight.py",
]
follow_imports = "skip"
check_untyped_defs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
strict_equality = true
show_error_codes = true

[[tool.mypy.overrides]]
module = [
  "reportlab.*",
  "yaml",
]
ignore_missing_imports = true
disallow_any_unimported = false
