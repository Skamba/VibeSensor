# Docker overrides — only fields that differ from Pi defaults.
# Uses local relative paths inside the container working directory.

server:
  port: 8000

logging:
  metrics_log_path: data/metrics.jsonl

gps:
  gps_enabled: false  # Docker containers do not run a gpsd daemon

update:
  rollback_dir: /app/apps/server/data/rollback  # Pi default /var/lib/vibesensor/rollback does not exist in container
