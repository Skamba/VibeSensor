name: pothole-recovery-loop
description: Cruise with repeated road impacts, then a quiet recovery section.
phases:
- name: steady-road
  duration_s: 6.0
  speed_start_kmh: 58.0
  speed_end_kmh: 70.0
  overrides:
  - target: all
    profile_name: rough_road
    scene_gain: 0.36
    scene_noise_gain: 1.04
    amp_scale: 0.64
    noise_scale: 1.04
    common_event_gain: 0.14
  - target: body
    profile_name: rear_body
    scene_gain: 0.44
    scene_noise_gain: 1.03
    amp_scale: 0.76
    noise_scale: 1.02
    common_event_gain: 0.16
  pulses: []
- name: impact-cluster
  duration_s: 5.0
  speed_start_kmh: 70.0
  speed_end_kmh: 72.0
  overrides:
  - target: all
    profile_name: rough_road
    scene_gain: 0.48
    scene_noise_gain: 1.12
    amp_scale: 0.76
    noise_scale: 1.1
    common_event_gain: 0.24
  - target: body
    profile_name: rear_body
    scene_gain: 0.58
    scene_noise_gain: 1.14
    amp_scale: 0.88
    noise_scale: 1.1
    common_event_gain: 0.28
  pulses:
  - at_s: 0.7
    target: all
    strength: 0.4
  - at_s: 1.6
    target: left-side
    strength: 0.54
  - at_s: 2.4
    target: right-side
    strength: 0.5
  - at_s: 3.5
    target: all
    strength: 0.36
- name: post-impact-hold
  duration_s: 4.0
  speed_start_kmh: 72.0
  speed_end_kmh: 72.0
  overrides:
  - target: all
    profile_name: rough_road
    scene_gain: 0.48
    scene_noise_gain: 1.12
    amp_scale: 0.76
    noise_scale: 1.1
    common_event_gain: 0.24
  - target: body
    profile_name: rear_body
    scene_gain: 0.58
    scene_noise_gain: 1.14
    amp_scale: 0.88
    noise_scale: 1.1
    common_event_gain: 0.28
  pulses: []
- name: recovery
  duration_s: 7.0
  speed_start_kmh: 72.0
  speed_end_kmh: 62.0
  overrides:
  - target: all
    profile_name: rough_road
    scene_gain: 0.2
    scene_noise_gain: 0.94
    amp_scale: 0.42
    noise_scale: 0.94
    common_event_gain: 0.05
  - target: body
    profile_name: rear_body
    scene_gain: 0.24
    scene_noise_gain: 0.95
    amp_scale: 0.5
    noise_scale: 0.95
    common_event_gain: 0.06
  pulses: []
