name: launch-engine-flare
description: Low-speed launch with strong engine order that settles into normal cruise.
phases:
- name: idle-creep
  duration_s: 5.0
  speed_start_kmh: 0.0
  speed_end_kmh: 18.0
  overrides:
  - target: all
    profile_name: engine_idle
    scene_gain: 0.7
    scene_noise_gain: 0.98
    amp_scale: 0.92
    noise_scale: 0.96
    common_event_gain: 0.1
  - target: body
    profile_name: rear_body
    scene_gain: 0.46
    scene_noise_gain: 0.98
    amp_scale: 0.7
    noise_scale: 0.96
    common_event_gain: 0.08
  pulses:
  - at_s: 2.0
    target: all
    strength: 0.12
- name: flare
  duration_s: 7.0
  speed_start_kmh: 18.0
  speed_end_kmh: 72.0
  overrides:
  - target: all
    profile_name: engine_order
    scene_gain: 0.88
    scene_noise_gain: 1.04
    amp_scale: 1.04
    noise_scale: 1.0
    common_event_gain: 0.2
  - target: front-axle
    profile_name: engine_order
    scene_gain: 0.94
    scene_noise_gain: 1.06
    amp_scale: 1.08
    noise_scale: 1.02
    common_event_gain: 0.24
  - target: body
    profile_name: rear_body
    scene_gain: 0.54
    scene_noise_gain: 1.02
    amp_scale: 0.8
    noise_scale: 1.0
    common_event_gain: 0.16
  pulses:
  - at_s: 1.5
    target: front-axle
    strength: 0.2
  - at_s: 4.2
    target: all
    strength: 0.18
- name: engine-hold
  duration_s: 4.0
  speed_start_kmh: 72.0
  speed_end_kmh: 72.0
  overrides:
  - target: all
    profile_name: engine_order
    scene_gain: 0.88
    scene_noise_gain: 1.04
    amp_scale: 1.04
    noise_scale: 1.0
    common_event_gain: 0.2
  - target: front-axle
    profile_name: engine_order
    scene_gain: 0.94
    scene_noise_gain: 1.06
    amp_scale: 1.08
    noise_scale: 1.02
    common_event_gain: 0.24
  - target: body
    profile_name: rear_body
    scene_gain: 0.54
    scene_noise_gain: 1.02
    amp_scale: 0.8
    noise_scale: 1.0
    common_event_gain: 0.16
  pulses: []
- name: cruise
  duration_s: 6.0
  speed_start_kmh: 72.0
  speed_end_kmh: 68.0
  overrides:
  - target: all
    profile_name: rough_road
    scene_gain: 0.28
    scene_noise_gain: 1.0
    amp_scale: 0.54
    noise_scale: 1.0
    common_event_gain: 0.1
  - target: body
    profile_name: rear_body
    scene_gain: 0.34
    scene_noise_gain: 1.0
    amp_scale: 0.62
    noise_scale: 1.0
    common_event_gain: 0.12
  pulses: []
