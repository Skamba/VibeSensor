name: highway-window-shudder
description: All-sensor shudder appears only inside a narrow highway-speed window.
phases:
- name: approach
  duration_s: 7.0
  speed_start_kmh: 68.0
  speed_end_kmh: 94.0
  overrides:
  - target: all
    profile_name: rough_road
    scene_gain: 0.3
    scene_noise_gain: 1.0
    amp_scale: 0.56
    noise_scale: 1.0
    common_event_gain: 0.12
  - target: body
    profile_name: rear_body
    scene_gain: 0.38
    scene_noise_gain: 1.0
    amp_scale: 0.68
    noise_scale: 1.0
    common_event_gain: 0.14
  pulses: []
- name: resonance-window
  duration_s: 5.0
  speed_start_kmh: 94.0
  speed_end_kmh: 100.0
  overrides:
  - target: all
    profile_name: wheel_mild_imbalance
    scene_gain: 0.62
    scene_noise_gain: 1.05
    amp_scale: 0.9
    noise_scale: 1.04
    common_event_gain: 0.44
  - target: body
    profile_name: rear_body
    scene_gain: 0.72
    scene_noise_gain: 1.04
    amp_scale: 0.98
    noise_scale: 1.04
    common_event_gain: 0.5
  pulses:
  - at_s: 1.2
    target: all
    strength: 0.3
  - at_s: 3.0
    target: all
    strength: 0.34
  - at_s: 4.5
    target: all
    strength: 0.26
- name: shudder-hold
  duration_s: 4.0
  speed_start_kmh: 100.0
  speed_end_kmh: 100.0
  overrides:
  - target: all
    profile_name: wheel_mild_imbalance
    scene_gain: 0.62
    scene_noise_gain: 1.05
    amp_scale: 0.9
    noise_scale: 1.04
    common_event_gain: 0.44
  - target: body
    profile_name: rear_body
    scene_gain: 0.72
    scene_noise_gain: 1.04
    amp_scale: 0.98
    noise_scale: 1.04
    common_event_gain: 0.5
  pulses: []
- name: clear-air
  duration_s: 6.0
  speed_start_kmh: 100.0
  speed_end_kmh: 112.0
  overrides:
  - target: all
    profile_name: rough_road
    scene_gain: 0.26
    scene_noise_gain: 0.98
    amp_scale: 0.5
    noise_scale: 0.98
    common_event_gain: 0.1
  - target: body
    profile_name: rear_body
    scene_gain: 0.3
    scene_noise_gain: 0.98
    amp_scale: 0.58
    noise_scale: 0.98
    common_event_gain: 0.1
  pulses: []
