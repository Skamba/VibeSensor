services:
  vibesensor-server:
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      PYTHONPATH: /workspace/apps/server
    command:
      - vibesensor-server
      - --reload
      - --config
      - /workspace/apps/server/config.docker.yaml

  vibesensor-ui-dev:
    image: node:22-slim
    network_mode: host
    working_dir: /workspace/apps/ui
    depends_on:
      - vibesensor-server
    volumes:
      - .:/workspace
      - vibesensor-ui-node_modules:/workspace/apps/ui/node_modules
    command:
      - npm
      - run
      - dev:docker
      - --
      - --host
      - 0.0.0.0
      - --port
      - "5173"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5173/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 75s

volumes:
  vibesensor-ui-node_modules:
